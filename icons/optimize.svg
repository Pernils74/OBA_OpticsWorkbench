<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg">

  <!-- White page with outline -->
  <rect x="4" y="4" width="56" height="56" rx="6" ry="6"
        fill="white" stroke="black" stroke-width="3"/>

  <!-- Spreadsheet grid (gray) -->
  <rect x="10" y="16" width="18" height="24"
        fill="#e5e5e5" stroke="#888" stroke-width="1.5"/>
  <line x1="10" y1="24" x2="28" y2="24"
        stroke="#888" stroke-width="1"/>
  <line x1="10" y1="32" x2="28" y2="32"
        stroke="#888" stroke-width="1"/>
  <line x1="16" y1="16" x2="16" y2="40"
        stroke="#888" stroke-width="1"/>
  <line x1="22" y1="16" x2="22" y2="40"
        stroke="#888" stroke-width="1"/>

  <!-- Optuna hexagon emblem -->
  <g transform="translate(34,10) scale(0.6)">
    <polygon points="16,0 32,8 32,24 16,32 0,24 0,8"
             fill="none" stroke="#1c76d2" stroke-width="4"/>
    <polygon points="16,6 26,11 26,21 16,26 6,21 6,11"
             fill="none" stroke="#1c76d2" stroke-width="3"/>
  </g>

  <!-- Optuna text -->
  <text x="34" y="22"
        font-family="Sans" font-size="10"
        fill="black">Optuna</text>

  <!-- Optimization line chart (black graph) -->
  <polyline points="10,48 22,40 32,44 44,34"
            fill="none" stroke="black" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="10" cy="48" r="3" fill="black"/>
  <circle cx="22" cy="40" r="3" fill="black"/>
  <circle cx="32" cy="44" r="3" fill="black"/>
  <circle cx="44" cy="34" r="3" fill="black"/>

  <!-- Arrow head -->
  <polygon points="44,34 54,30 47,40"
           fill="black"/>

  <!-- Bottom label -->
  <text x="32" y="59"
        text-anchor="middle"
        font-family="Sans"
        font-size="10"
        font-weight="bold"
        fill="black">
    OPTICAL CELLS
  </text>

</svg>