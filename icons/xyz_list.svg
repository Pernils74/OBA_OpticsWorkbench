<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Outer table frame -->
  <rect x="10" y="12" width="36" height="40"
        fill="#eef5fc"
        stroke="black"
        stroke-width="2"
        rx="4" ry="4"/>

  <!-- Horizontal lines -->
  <line x1="10" y1="26" x2="46" y2="26"
        stroke="black" stroke-width="3"/>
  <line x1="10" y1="40" x2="46" y2="40"
        stroke="black" stroke-width="2"/>

  <!-- Vertical lines -->
  <line x1="22" y1="12" x2="22" y2="52"
        stroke="black" stroke-width="3"/>
  <line x1="34" y1="12" x2="34" y2="52"
        stroke="black" stroke-width="2"/>

  <!-- Export / save arrow -->
  <g fill="#eef5fc" stroke="black" stroke-width="3">
    <line x1="50" y1="26" x2="58" y2="26"/>
    <polygon points="58,26 52,20 52,32"/>
  </g>

</svg>
