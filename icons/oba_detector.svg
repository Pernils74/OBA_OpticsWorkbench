<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64"
     viewBox="0 0 64 64">

  <!-- Detector plane -->
  <line x1="44" y1="6" x2="44" y2="58"
        stroke="#2c3e50"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Incoming ray -->
  <line x1="6" y1="32" x2="60" y2="32"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- Detection marker -->
  <circle cx="44" cy="32"
          r="4"
          fill="#e74c3c"/>

</svg>