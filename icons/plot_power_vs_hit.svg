<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24"
     viewBox="0 0 24 24">

  <!-- Axes -->
  <line x1="4" y1="20" x2="20" y2="20"
        stroke="#6a6a6a"
        stroke-width="1"/>
  <line x1="4" y1="20" x2="4" y2="4"
        stroke="#6a6a6a"
        stroke-width="1"/>

  <!-- Axis arrows -->
  <polygon points="20,20 18.8,19.4 18.8,20.6"
           fill="#6a6a6a"/>
  <polygon points="4,4 3.4,5.2 4.6,5.2"
           fill="#6a6a6a"/>

  <!-- Power vs hit curve -->
  <polyline
      points="4.5,7 8,10.5 11.5,13.2 15,15.3 18.5,17.2"
      fill="none"
      stroke="#4f8cff"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"/>

  <!-- Hit markers -->
  <circle cx="4.5" cy="7" r="1.2" fill="#ffd27f"/>
  <circle cx="8" cy="10.5" r="1.1" fill="#ffd27f"/>
  <circle cx="11.5" cy="13.2" r="1.1" fill="#ffd27f"/>
  <circle cx="15" cy="15.3" r="1.1" fill="#ffd27f"/>
  <circle cx="18.5" cy="17.2" r="1.1" fill="#ffd27f"/>

</svg>