<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24"
     viewBox="0 0 24 24">

  <!-- Axes -->
  <line x1="4" y1="20" x2="20" y2="20"
        stroke="#6a6a6a"
        stroke-width="1"/>
  <line x1="4" y1="20" x2="4" y2="4"
        stroke="#6a6a6a"
        stroke-width="1"/>

  <!-- Axis arrows -->
  <polygon points="20,20 18.8,19.4 18.8,20.6"
           fill="#6a6a6a"/>
  <polygon points="4,4 3.4,5.2 4.6,5.2"
           fill="#6a6a6a"/>

  <!-- Cluster hull -->
  <polygon points="6,15 8,11 12,10 16,12 17,15 14,17 9,18"
           fill="#e6e1c9"
           opacity="0.7"
           stroke="#6b6b6b"
           stroke-width="1.2"
           stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="8" cy="15" r="1.1" fill="#6b2d5c"/>
  <circle cx="10" cy="13" r="1.1" fill="#8a3f7a"/>
  <circle cx="12" cy="14" r="1.1" fill="#b48a00"/>
  <circle cx="14" cy="15" r="1.1" fill="#e0a000"/>
  <circle cx="13" cy="17" r="1.1" fill="#c47a00"/>

  <!-- Centroid -->
  <circle cx="12" cy="14.5" r="1.7"
          fill="none"
          stroke="#3a3a3a"
          stroke-width="1.2"/>

</svg>