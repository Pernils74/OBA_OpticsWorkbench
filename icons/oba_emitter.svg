<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64"
     viewBox="0 0 64 64">

  <!-- Emitter surface -->
  <rect x="10" y="6"
        width="10" height="52"
        rx="3"
        fill="#555555"
        stroke="#c4a000"
        stroke-width="3"/>

  <!-- Emitted rays (Lambertian / weakly diverging) -->
  <line x1="20" y1="20" x2="56" y2="14"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

  <line x1="20" y1="28" x2="58" y2="26"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

  <line x1="20" y1="36" x2="58" y2="38"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

  <line x1="20" y1="44" x2="56" y2="50"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

</svg>
