<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64"
     viewBox="0 0 64 64">

  <!-- Concave lens / mirror body -->
  <path d="
    M 22 10
    L 22 54
    L 26 54
    Q 10 32 26 10
    Z"
    fill="#4a90e2"
    stroke="#2171b5"
    stroke-width="3"/>

  <!-- Edge highlight (top thickness) -->
  <line x1="22" y1="10" x2="26" y2="10"
        stroke="#ffffff"
        stroke-width="2"/>

  <!-- Edge highlight (bottom thickness) -->
  <line x1="22" y1="54" x2="26" y2="54"
        stroke="#1b5fa7"
        stroke-width="2"/>

  <!-- ✅ Large plus -->
  <g transform="translate(44,44)">
    
    <circle cx="0" cy="0" r="14" fill="#666"/>

    <rect x="-8" y="-2" width="16" height="4" fill="#ffffff"/>
    <rect x="-2" y="-8" width="4" height="16" fill="#ffffff"/>

  </g>

</svg>