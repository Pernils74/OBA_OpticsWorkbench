<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64"
     viewBox="0 0 64 64">

  <!-- Grating body -->
  <line x1="30" y1="6" x2="30" y2="58"
        stroke="#4a90e2"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Grating grooves -->
  <path d="
    M 25 16 L 35 16
    M 25 28 L 35 28
    M 25 40 L 35 40
    M 25 52 L 35 52"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linecap="round"/>

  <!-- Incoming ray -->
  <line x1="6" y1="32" x2="26" y2="32"
        stroke="#d4af37"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- Diffracted orders -->
  <!-- m = +1 -->
  <line x1="34" y1="32" x2="60" y2="14"
        stroke="#ff0000"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- m = 0 -->
  <line x1="34" y1="32" x2="60" y2="32"
        stroke="#00ff00"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- m = -1 -->
  <line x1="34" y1="32" x2="60" y2="50"
        stroke="#0000ff"
        stroke-width="4"
        stroke-linecap="round"/>

</svg>