<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24"
     viewBox="0 0 24 24"
     fill="none"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- ========================================= -->
  <!-- XYZ LIST (TABLE BASE)                     -->
  <!-- ========================================= -->

  <!-- Outer table -->
  <rect x="2" y="3" width="14" height="18"
        rx="2" ry="2"
        fill="#eef5fc"
        stroke="#000000"
        stroke-width="1.5"/>

  <!-- Table rows -->
  <line x1="2" y1="9" x2="16" y2="9"
        stroke="#000000" stroke-width="1.2"/>
  <line x1="2" y1="14" x2="16" y2="14"
        stroke="#000000" stroke-width="1.2"/>

  <!-- Table columns -->
  <line x1="7" y1="3" x2="7" y2="21"
        stroke="#000000" stroke-width="1.2"/>
  <line x1="11.5" y1="3" x2="11.5" y2="21"
        stroke="#000000" stroke-width="1.2"/>

  <!-- ========================================= -->
  <!-- RADIAL / CLUSTER OVERLAY                  -->
  <!-- ========================================= -->

  <!-- Soft background disc (visual separation) -->
  <circle cx="17.5" cy="8.5" r="5.3"
          fill="#ffffff"
          fill-opacity="0.85"
          stroke="none"/>

  <!-- Concentric circles -->
  <g stroke="#ff7a18" stroke-width="1.1" fill="none">
    <circle cx="17.5" cy="8.5" r="2.0"/>
    <circle cx="17.5" cy="8.5" r="3.6"/>
    <circle cx="17.5" cy="8.5" r="5.0"/>
  </g>

  <!-- Radius arrow -->
  <g stroke="#000000" stroke-width="1.1">
    <line x1="17.5" y1="8.5" x2="22.5" y2="8.5"/>
    <polyline points="22.5 8.5 21 7.3"/>
    <polyline points="22.5 8.5 21 9.7"/>
  </g>

  <!-- Rotation hint -->
  <polyline points="18.8 2.4 16.2 3.3 18.8 4.2"
            stroke="#000000"
            stroke-width="1.1"
            fill="none"/>

  <!-- Center point -->
  <circle cx="17.5" cy="8.5" r="1.2"
          fill="#ff7a18"
          stroke="none"/>

</svg>