<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg" version="1.1">

  <!-- Panel / bakgrund -->
  <g id="panel_main">
    <rect x="5" y="5" width="54" height="54" rx="6"
          fill="#eeeeec" stroke="#231f0b" stroke-width="2"/>
    <path d="M 5,44 H 59 V 54 Q 59,59 54,59 H 10 Q 5,59 5,54 Z"
          fill="#d3d7cf" stroke="#231f0b" stroke-width="2"/>
  </g>

  <!-- Ray engine symbol -->
  <g id="ray_engine" transform="translate(32,30)">

    <!-- Inkommande stråle -->
    <path d="M -24,6 L -6,0"
          stroke="#f57900" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="-24" cy="6" r="2.2" fill="#f57900" stroke="#231f0b" stroke-width="0.8"/>

    <!-- “Mirror/prism” triangel -->
    <path d="M -4,-10 L 10,0 L -4,10 Z"
          fill="#729fcf" stroke="#204a87" stroke-width="2" opacity="0.95"/>

    <!-- Utgående strålar (reflektion + sekundär) -->
    <path d="M 10,0 L 24,-6"
          stroke="#fce94f" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M 10,0 L 20,10"
          stroke="#8ae234" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.95"/>

    <!-- Liten highlight på triangelspetsen -->
    <circle cx="10" cy="0" r="2.2" fill="#edd400" stroke="#231f0b" stroke-width="0.8"/>

    <!-- Kugghjul = “engine” -->
    <g id="gear" transform="translate(-12,-16) scale(0.9)">
      <circle cx="0" cy="0" r="4.2" fill="#d3d7cf" stroke="#2e3436" stroke-width="1.2"/>
      <!-- Tänder -->
      <g stroke="#2e3436" stroke-width="1.2" stroke-linecap="round">
        <line x1="0" y1="-7" x2="0" y2="-5"/>
        <line x1="0" y1="7"  x2="0" y2="5"/>
        <line x1="-7" y1="0" x2="-5" y2="0"/>
        <line x1="7" y1="0"  x2="5" y2="0"/>
        <line x1="-5" y1="-5" x2="-3.8" y2="-3.8"/>
        <line x1="5"  y1="5"  x2="3.8"  y2="3.8"/>
        <line x1="-5" y1="5"  x2="-3.8" y2="3.8"/>
        <line x1="5"  y1="-5" x2="3.8"  y2="-3.8"/>
      </g>
      <circle cx="0" cy="0" r="1.6" fill="#888a85"/>
    </g>
  </g>
</svg>